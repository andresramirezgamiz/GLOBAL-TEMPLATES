<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitratech · TA Candidate Email Templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00b5d8;
    --cyan-mid: #0bb3d6;
    --cyan-dark: #0b7ea3;
    --amber: #f59e0b;
    --amber-dark: #b45309;
    --page-bg: #f6fbff;
    --footer-bg: #e8fbff;
    --border: #bae8f5;
    --text: #0f172a;
    --muted: #64748b;
    --white: #ffffff;
    --font-display: 'Sora', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--page-bg);
    color: var(--text);
    font-family: var(--font-body);
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  :focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 2px;
  }

  /* ---------- Navbar ---------- */
  .navbar {
    position: sticky;
    top: 0;
    z-index: 60;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-dark) 100%);
    box-shadow: 0 2px 12px rgba(11,126,163,.25);
  }
  .navbar-inner {
    max-width: 1360px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
  }
  .navbar-logo {
    height: 24px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }
  .mega-tabs {
    display: flex;
    align-items: stretch;
    gap: 2px;
    flex: 1;
    min-width: 0;
    flex-wrap: wrap;
  }
  .mega-tab {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.72);
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 13px;
    padding: 18px 16px;
    cursor: pointer;
    position: relative;
    white-space: nowrap;
  }
  .mega-tab:hover { color: #fff; }
  .mega-tab.active { color: #fff; }
  .mega-tab.active::after {
    content: '';
    position: absolute;
    left: 16px;
    right: 16px;
    bottom: 0;
    height: 3px;
    background: #fff;
    border-radius: 3px 3px 0 0;
  }
  .intro-banner {
    background: #0b7ea3;
    color: #eafcff;
    text-align: center;
    padding: 10px 24px;
    font-size: 12.5px;
    line-height: 1.5;
  }
  .intro-banner strong { color: #fff; }
  .subnav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    padding: 16px 24px 4px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .subnav-tab {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .subnav-tab.active {
    background: var(--cyan);
    border-color: var(--cyan);
    color: #fff;
  }
  .count-badge-sm {
    background: var(--page-bg);
    color: var(--cyan-dark);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 10.5px;
    margin-left: 2px;
  }
  .subnav-tab.active .count-badge-sm { background: rgba(255,255,255,0.3); color: #fff; }
  #stageTabs.stage-tabs {
    background: linear-gradient(135deg, var(--cyan) 0%, var(--cyan-dark) 100%);
    padding: 0 16px;
    -webkit-mask-image: none;
    mask-image: none;
    justify-content: center;
    flex-wrap: wrap;
    overflow-x: visible;
  }
  .stage-tabs {
    display: flex;
    align-items: stretch;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: thin;
    flex: 1;
    min-width: 0;
    -webkit-mask-image: linear-gradient(to right, black calc(100% - 20px), transparent 100%);
    mask-image: linear-gradient(to right, black calc(100% - 20px), transparent 100%);
  }
  .stage-tabs::-webkit-scrollbar { height: 4px; }
  .stage-tab {
    position: relative;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 16px 9px;
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.72);
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s ease;
  }
  .stage-tab:hover { color: #fff; }
  .stage-tab .step-num {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.85);
    transition: all .15s ease;
  }
  .stage-tab.is-done .step-num {
    background: rgba(255,255,255,0.92);
    border-color: transparent;
    color: var(--cyan-dark);
  }
  .stage-tab.active .step-num {
    background: #fff;
    border-color: transparent;
    color: var(--cyan-dark);
  }
  .stage-tab.active { color: #fff; }
  .stage-tab .count-badge {
    background: rgba(255,255,255,0.16);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 10.5px;
    font-family: var(--font-body);
    font-weight: 600;
  }
  .stage-tab.active .count-badge { background: rgba(255,255,255,0.3); }
  .stage-tab::after {
    content: '';
    position: absolute;
    left: 13px;
    right: 13px;
    bottom: 0;
    height: 3px;
    border-radius: 3px 3px 0 0;
    background: transparent;
  }
  .stage-tab.active::after { background: #fff; }
  .navbar-actions {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
    padding: 12px 0;
  }
  .btn {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 12px;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border: none;
    white-space: nowrap;
    transition: transform .1s ease, background .15s ease;
  }
  .btn:active { transform: scale(0.97); }
  .btn-ghost {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    padding: 7px 11px;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.2); }
  .btn-amber {
    background: var(--amber);
    color: #241800;
    padding: 7px 13px;
  }
  .btn-amber:hover { background: #e08e00; }

  /* ---------- Page header ---------- */
  .page-header {
    max-width: 1100px;
    margin: 0 auto;
    padding: 34px 24px 6px;
  }
  .page-header .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--cyan-dark);
    margin: 0 0 8px;
    font-weight: 500;
  }
  .page-header h1 {
    font-family: var(--font-display);
    font-size: 27px;
    font-weight: 800;
    margin: 0 0 8px;
    color: var(--text);
  }
  .page-header p {
    font-family: var(--font-body);
    color: var(--muted);
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 660px;
    margin: 0;
  }

  /* ---------- Content ---------- */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 90px;
  }
  .intent-group { margin-bottom: 34px; }
  .intent-group__label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--cyan-dark);
    margin: 0 0 13px;
  }
  .intent-group__label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .accordion-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .accordion-item {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 3px 14px rgba(16,24,40,.05);
  }
  .accordion-header {
    width: 100%;
    background: var(--white);
    border: none;
    padding: 17px 20px;
    display: flex;
    align-items: center;
    gap: 13px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
  }
  .accordion-header:hover { background: var(--page-bg); }
  .item-title {
    flex: 1;
    font-family: var(--font-display);
    font-size: 15.5px;
    font-weight: 700;
    color: var(--text);
  }
  .badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 11px;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .03em;
    flex-shrink: 0;
    font-family: var(--font-body);
  }
  .custom-flag {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--amber);
    color: #241800;
    text-transform: uppercase;
    letter-spacing: .03em;
    flex-shrink: 0;
  }
  .edited-flag {
    background: var(--cyan-mid);
    color: #fff;
  }
  .icon-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 15px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 6px;
    flex-shrink: 0;
    border-radius: 6px;
  }
  .icon-btn:hover { color: var(--cyan-dark); background: var(--page-bg); }
  .chevron {
    color: var(--cyan-dark);
    font-size: 16px;
    transition: transform .2s ease;
    flex-shrink: 0;
  }
  .accordion-item.open .chevron { transform: rotate(180deg); }
  .delete-x {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 2px 4px;
    flex-shrink: 0;
    border-radius: 6px;
  }
  .delete-x:hover { color: #dc2626; background: #fef2f2; }
  .stage-add-tab {
    font-size: 16px;
    font-weight: 700;
    padding: 16px 16px;
    color: rgba(255,255,255,0.8);
  }
  .stage-add-tab:hover { color: #fff; }
  .stage-delete-x {
    margin-left: 2px;
    opacity: 0.7;
    font-size: 13px;
  }
  .stage-delete-x:hover { opacity: 1; color: #ffb4b4; }
  .accordion-body {
    display: none;
    padding: 0 20px 24px;
    border-top: 1px solid var(--border);
  }
  .accordion-item.open .accordion-body { display: block; }
  .desc {
    font-size: 13.5px;
    color: var(--muted);
    line-height: 1.65;
    margin: 17px 0 14px;
  }
  .subject-line {
    font-size: 12.5px;
    color: var(--text);
    background: var(--page-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin: 0 0 14px;
    font-family: var(--font-mono);
  }
  .subject-line span {
    font-family: var(--font-body);
    font-weight: 700;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: .05em;
    color: var(--cyan-dark);
    margin-right: 8px;
  }
  .toggle-btn {
    background: none;
    border: none;
    color: var(--cyan-dark);
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 0;
    margin-bottom: 12px;
    text-decoration: underline;
    font-family: var(--font-body);
  }
  .preview-wrap {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--page-bg);
    margin-bottom: 10px;
  }
  iframe.preview {
    width: 100%;
    height: 760px;
    border: 0;
    display: block;
    background: var(--page-bg);
  }
  .code-block {
    background: #0f172a;
    color: #d7e9ee;
    padding: 16px;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    overflow-x: auto;
    max-height: 420px;
    overflow-y: auto;
    margin: 0;
  }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 54px 20px;
    border: 1.5px dashed var(--border);
    border-radius: 14px;
  }
  .empty-state button {
    display: inline-block;
    margin-top: 12px;
  }

  footer {
    background: var(--footer-bg);
    text-align: center;
    padding: 26px;
    font-size: 13px;
    color: var(--muted);
    font-family: var(--font-body);
  }
  footer a { color: var(--cyan-dark); text-decoration: underline; margin: 0 8px; }

  /* ---------- Toast ---------- */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: #fff;
    padding: 13px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    font-family: var(--font-body);
    box-shadow: 0 8px 24px rgba(0,0,0,.2);
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .2s ease, transform .2s ease;
    pointer-events: none;
    max-width: 320px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ---------- Modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #fff;
    border-radius: 18px;
    max-width: 760px;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0;
  }
  .modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 26px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: #fff;
    z-index: 2;
  }
  .modal-head h2 {
    font-family: var(--font-display);
    font-size: 19px;
    margin: 0;
    color: var(--text);
  }
  .modal-close {
    background: var(--page-bg);
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    color: var(--muted);
  }
  .modal-close:hover { background: var(--border); }
  .modal-body { padding: 22px 26px 28px; }
  .form-row { margin-bottom: 16px; }
  .form-row-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  label {
    display: block;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
  }
  input[type="text"], select, textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    font-family: var(--font-body);
    font-size: 13.5px;
    color: var(--text);
    background: #fff;
  }
  input[type="text"]:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--cyan);
  }
  textarea { resize: vertical; }
  textarea.mono {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.5;
  }
  .field-hint {
    font-size: 11.5px;
    color: var(--muted);
    margin-top: 4px;
  }
  .modal-preview-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--cyan-dark);
    margin: 4px 0 8px;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }
  .btn-cancel {
    background: var(--page-bg);
    color: var(--text);
    padding: 10px 18px;
  }
  .btn-cancel:hover { background: var(--border); }
  .btn-submit {
    background: var(--cyan-dark);
    color: #fff;
    padding: 10px 20px;
  }
  .btn-submit:hover { background: #095f7d; }
  .hidden { display: none !important; }

  /* ---------- Audit / Migration Proposal View ---------- */
  .btn-ghost.active-toggle {
    background: rgba(255,255,255,0.35);
    border-color: #fff;
  }
  .audit-view {
    max-width: 1100px;
    margin: 0 auto;
    padding: 34px 24px 90px;
  }
  .audit-intro {
    text-align: center;
    margin-bottom: 28px;
  }
  .audit-intro .eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--cyan-dark);
    margin: 0 0 8px;
  }
  .audit-intro h1 {
    font-family: var(--font-display);
    font-size: 27px;
    font-weight: 800;
    margin: 0 0 10px;
  }
  .audit-intro p {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
    max-width: 720px;
    margin: 0 auto;
  }
  .audit-stats {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin: 30px 0;
  }
  .audit-stat-hero {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 36px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(16,24,40,.05);
  }
  .audit-stat-hero.highlight {
    border-color: var(--cyan);
    background: var(--page-bg);
  }
  .audit-stat-hero .num {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 800;
    color: var(--cyan-dark);
  }
  .audit-stat-hero .lbl {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-top: 4px;
  }
  .audit-stat-arrow {
    font-size: 28px;
    color: var(--border);
  }
  .audit-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 30px;
  }
  .audit-filter-btn {
    background: #fff;
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
  }
  .audit-filter-btn.active {
    background: var(--vc, var(--cyan));
    border-color: var(--vc, var(--cyan));
    color: #fff;
  }
  .audit-group { margin-bottom: 30px; }
  .audit-group-label {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 15px;
    margin: 0 0 14px;
  }
  .audit-group-count {
    background: var(--page-bg);
    border-radius: 999px;
    padding: 1px 9px;
    font-size: 12px;
    color: var(--muted);
  }
  .audit-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 14px;
  }
  .audit-card {
    background: #fff;
    border: 1px solid var(--border);
    border-left: 4px solid var(--vc, var(--cyan));
    border-radius: 10px;
    padding: 16px 18px;
    box-shadow: 0 3px 12px rgba(16,24,40,.04);
  }
  .audit-card-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 6px;
  }
  .audit-card-reason {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
    margin-bottom: 10px;
  }
  .audit-stage-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--cyan-dark);
    background: var(--page-bg);
    border-radius: 999px;
    padding: 3px 10px;
    margin-right: 6px;
  }
  .audit-jump-btn {
    display: block;
    margin-top: 8px;
    background: none;
    border: none;
    color: var(--cyan-dark);
    font-size: 12.5px;
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
    padding: 0;
    font-family: var(--font-body);
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <img class="navbar-logo" src="https://i.imgur.com/3Xbjz6R.png" alt="Mitratech">
    <div class="mega-tabs" id="megaTabs">
      <button class="mega-tab" data-mega="global">Global Templates</button>
      <button class="mega-tab" data-mega="northAmerica">North America Templates</button>
      <button class="mega-tab" data-mega="proposal">New Global Templates Proposal</button>
    </div>
    <div class="navbar-actions" id="navbarActions">
      <button class="btn btn-ghost" id="exportBtn" title="Download a new file with all current templates baked in">&#8681; Export Page</button>

600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">I hope this message finds you well. We recently reached out to check your availability for an interview regarding the <strong>{{JOB_NAME}}</strong> role at Mitratech, but we haven't received a response yet.</p>\n<!-- Info box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border: 2px solid #0bb3d6; border-radius: 14px; padding: 16px 20px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a; text-align: center;\">Are you <strong>still interested</strong> in moving forward with this opportunity?<br><span style=\"font-size: 13px; color: #64748b; display: block; margin-top: 6px;\">A quick reply either way helps us coordinate next steps and keep your profile up to date.</span></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">We'd love to hear from you &mdash; and if you're no longer interested, we completely understand and would appreciate a quick note so we can update our records accordingly.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you in advance for your time, and we look forward to your response.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>\n", "subject": null}, {"id": "t15", "intent": "Follow-Up & Status", "stage": "Reviewing", "region": "All", "name": "Follow-Up Template Candidates", "desc": "Keeps the candidate updated while we're still waiting on feedback from the hiring manager or on other interviews in progress.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">I hope you're having a great day! I wanted to take a moment to thank you for your patience and continued interest in the <strong>{{JOB_NAME}}</strong> role at Mitratech. We truly appreciate the time and effort you've put into the process so far.</p>\n<!-- Highlight box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">Right now, we're still waiting for feedback from the hiring manager and for the remaining interviews this week to wrap up. As soon as I have any updates, I'll be sure to let you know.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">I know waiting can be tough, but please know that we truly value your candidacy and are excited about the possibility of you joining the team.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Let me know if you have any questions in the meantime &mdash; I'm happy to help!</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>", "subject": null}, {"id": "t8", "intent": "Special Situations", "stage": "Reviewing", "region": "All", "name": "New Opportunity at Mitratech – Let's Reconnect!", "desc": "Used to reconnect with candidates from past processes when a new opening comes up that matches their profile.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">I hope you've been doing well! I'm reaching out because we have an exciting new opportunity at Mitratech, and based on your previous application and experience, we believe you could be a great match for our <strong>{{JOB_NAME}}</strong> role.</p>\n<!-- Highlight box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">We'd love to reconnect &mdash; share more details about the role, hear what you've been up to, and explore together if this could be a great fit for you.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">Please feel free to share your updated resume, and use the link below to let me know your availability for a quick call. I'd be happy to coordinate a time that works best for you.</p>\n<!-- CTA Button -->\n<table role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 8px 0 24px;\" align=\"center\">{{AVAILABILITY_SUBMISSION_LINK}}</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">Looking forward to hearing from you!</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>", "subject": null}, {"id": "t21", "intent": "Rejection", "stage": "Reviewing", "region": "All", "name": "Default Candidate Rejection", "subject": "Information regarding your application for {{JOB_NAME}} at {{COMPANY}}", "desc": "General-purpose rejection with a link to open positions, signed from the Recruiting Team rather than an individual recruiter.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"padding: 24px;\" align=\"center\">\n\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(1 nt-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>\n"}, {"id": "t13", "intent": "Interview Confirmation", "stage": "Assessment", "region": "All", "name": "Interview Confirmation – Manager's Schedule", "desc": "Same as the standard confirmation, but explains that the time slot was set based on the manager's limited availability.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hey {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Thanks for sharing your availability for the <strong>{{JOB_NAME}}</strong> position! We really appreciate your flexibility and are excited about moving forward with the interview process.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Due to limited availability from one of our managers, the interview was scheduled at the time that best aligned with the manager's schedule while also considering the availability you shared.</p>\n<!-- Interview Details Box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border: 2px solid #0bb3d6; border-radius: 14px; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial;\">\n<p style=\"font-size: 12px; font-weight: bold; color: #0b7ea3; text-transform: uppercase; letter-spacing: .04em; margin: 0 0 12px;\">Interview details</p>\n<table role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"font-size: 13px; font-weight: 600; color: #64748b; padding: 5px 16px 5px 0; vertical-align: top; white-space: nowrap;\">Date</td>\n<td style=\"font-size: 13px; color: #0f172a; padding: 5px 0;\">{{INTERVIEW_SCHEDULE}}</td>\n</tr>\n<tr>\n<td style=\"font-size: 13px; font-weight: 600; color: #64748b; padding: 5px 16px 5px 0; vertical-align: top; white-space: nowrap;\">Time</td>\n<td style=\"font-size: 13px; color: #0f172a; padding: 5px 0;\">{{INTERVIEW_SCHEDULE_START_TIME}}</td>\n</tr>\n<tr>\n<td style=\"font-size: 13px; font-weight: 600; color: #64748b; padding: 5px 16px 5px 0; vertical-align: top; white-space: nowrap;\">Format</td>\n<td style=\"font-size: 13px; color: #0f172a; padding: 5px 0;\">Video Interview &mdash; Microsoft Teams</td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\"><strong>How to join:</strong> Click the link below when it's time for your interview. You'll also receive a reminder email with the link.</p>\n<!-- CTA Button -->\n<table role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 8px 0 24px;\" align=\"center\"><a style=\"display: inline-block; background: #0bb3d6; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; font-weight: 600;\" href=\"#\">MITRATECH INTERVIEW LINK</a></td>\n</tr>\n</tbody>\n</table>\n<!-- Divider -->\n<table role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"border-top: 1px solid #e8fbff; font-size: 0;\">&nbsp;</td>\n</tr>\n</tbody>\n</table>\n<!-- Interview Tips Box -->\n<table style=\"margin: 20px 0 16px;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f6fbff; border-radius: 10px; padding: 18px 20px; font-family: Segoe UI,Roboto,Arial;\">\n<p style=\"font-size: 15px; font-weight: bold; color: #0b7ea3; margin: 0 0 14px;\">Interview Tips</p>\n<!-- Tip 1 -->\n<table style=\"margin-bottom: 10px;\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 12px; font-weight: bold;\">✓</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5;\"><strong>Use a computer</strong> if possible &mdash; it usually provides a more stable connection.</td>\n</tr>\n</tbody>\n</table>\n<!-- Tip 2 -->\n<table style=\"margin-bottom: 10px;\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 12px; font-weight: bold;\">✓</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5;\">If using a phone, download and use the <strong>Microsoft Teams app</strong> for the best experience.</td>\n</tr>\n</tbody>\n</table>\n<!-- Tip 3 -->\n<table style=\"margin-bottom: 10px;\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 12px; font-weight: bold;\">✓</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5;\">Find a <strong>quiet, well-lit space</strong> and keep some water nearby.</td>\n</tr>\n</tbody>\n</table>\n<!-- Tip 4 with sub-checklist -->\n<table role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 12px; font-weight: bold;\">✓</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5;\">Take 5 minutes beforehand to:\n<table style=\"margin-top: 6px;\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 2px 0; font-size: 13px; color: #475569;\">✓&nbsp; Check your internet connection</td>\n</tr>\n<tr>\n<td style=\"padding: 2px 0; font-size: 13px; color: #475569;\">✓&nbsp; Make sure the link and login permissions work</td>\n</tr>\n<tr>\n<td style=\"padding: 2px 0; font-size: 13px; color: #475569;\">✓&nbsp; Test your audio and video</td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">If you have any questions or need help before the interview, feel free to reach out.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Could you reply to this email to confirm you've received all the details?</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Looking forward to it!<br><br>Best,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>", "subject": null}, {"id": "t16", "intent": "Special Situations", "stage": "Interviewing", "region": "All", "name": "Interview in Progress Follow-Up", "desc": "Sent if the candidate hasn't joined a few minutes after the interview start time, offering to reschedule.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Dear {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">We just wanted to check in &mdash; your interview for the <strong>{{JOB_NAME}}</strong> role was scheduled to begin a few minutes ago, but it looks like you haven't joined the call yet.</p>\n<!-- Info box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #fff8ed; border-left: 4px solid #f59e0b; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">If you're experiencing any technical issues or if something has come up unexpectedly, please don't worry &mdash; we completely understand and would be happy to reschedule at a time that works better for you.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">Feel free to reply to this email or let us know if you need any support joining the session. We remain excited about the opportunity to connect with you.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Looking forward to hearing from you.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>", "subject": null}, {"id": "t17", "intent": "Special Situations", "stage": "Interviewing", "region": "All", "name": "Interview Rescheduling Notice", "desc": "Notifies the candidate that, due to an internal, unexpected issue, today's interview needs to be canceled and rescheduled.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">I hope you're doing well. I'm reaching out with an important update regarding your interview for the <strong>{{JOB_NAME}}</strong> role scheduled for today.</p>\n<!-- Notice box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #fff8ed; border-left: 4px solid #f59e0b; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">Due to an unexpected urgent matter with the hiring manager, we will need to <strong>cancel today's interview</strong>. We sincerely apologize for any inconvenience this may cause &mdash; this was not anticipated, and we truly appreciate your understanding and flexibility.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">Please know that we remain very interested in moving forward with you. Our team will contact you as soon as possible with new available time options to reschedule, and we will do our best to find an alternative that fits your schedule.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you in advance for your patience, and please don't hesitate to reach out if you have any questions in the meantime.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>", "subject": null}, {"id": "t18", "intent": "Special Situations", "stage": "Interviewing", "region": "All", "name": "Job on Hold", "subject": "Mitratech Application Follow Up", "desc": "Informs the candidate that the position has been placed on hold; their application is kept on file for future openings.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you for taking the time to apply to the <strong>{{JOB_NAME}}</strong> posting at Mitratech.</p>\n<!-- Notice box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #fff8ed; border-left: 4px solid #f59e0b; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">I am writing to let you know this position has been placed on hold, so we will not be able to move forward with your application at this time.</td>\n</tr>\n</tbody>\n</table>\n<!-- Info box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">Your application will be kept on file and someone from our team will reach out if the position is reopened at a later date, or if there is a potential match for another open role based on your skills and experience.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you again for your application and interest in Mitratech.</p>\n<p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>\n"}, {"id": "t19", "intent": "Rejection", "stage": "Interviewing", "region": "All", "name": "For Future (Rejection)", "desc": "A warm rejection for standout candidates who didn't get this role but stay on our radar for future opportunities, with a fast-track promise.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><!-- Header -->\n<tr>\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n</tr>\n<!-- Body -->\n<tr>\n<td style=\"padding: 28px 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 14px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 14px;\">First of all, thank you so much for the time, energy, and thoughtfulness you invested throughout our <strong>{{JOB_NAME}}</strong> interview process. It was truly a pleasure to speak with you and learn more about your experience and strengths &mdash; you made a fantastic impression on everyone involved.</p>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 14px;\">After a great deal of consideration, we have decided to move forward with another candidate who, while only slightly more aligned with the immediate needs of the role, was ultimately selected for this particular position.</p>\n<!-- Highlighted message box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">That said, we were genuinely impressed by your background, professionalism, and the way you carried yourself throughout every stage of the process. You truly stood out, and we're grateful to have had the chance to meet you.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 14px;\">I will absolutely be keeping your profile close. When a similar opportunity opens up &mdash; and we're confident it will &mdash; you'll be at the top of our list. In fact, we'd love to fast-track you directly to the final interview stage when the right fit becomes available.</p>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 14px;\">Please don't hesitate to stay in touch, and we hope to cross paths again very soon. Thank you once again, and all the very best in your journey &mdash; we're sure exciting opportunities lie ahead for you.</p>\n<!-- CTA -->\n<table role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"padding: 20px 0 24px;\" align=\"center\"><a style=\"display: inline-block; background: #0bb3d6; color: #ffffff; text-decoration: none; padding: 12px 32px; border-radius: 8px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; font-weight: 600;\" href=\"https://mitratech.com/careers\">View Open Positions</a></td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0;\">Warm regards,<br><strong>Mitratech Recruiting Team</strong></p>\n</td>\n</tr>\n<!-- Divider image -- u for taking the time to speak with us and explore the <strong>{{JOB_NAME}}</strong> opportunity with our team. I appreciate your patience, and wanted to provide an update.</p>\n\n<!-- Notice box -->\n\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"background: #fff8ed; border-left: 4px solid #f59e0b; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">After careful consideration, we have decided to move in another direction for this role.</td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n<!-- Info box -->\n\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">We will be sure to keep your information on file for other roles that may be a great fit for your background and experience.</td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you again for your time and interest in Mitratech.</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">{{MY_FIRST_NAME}}<br>{{MY_JOB_TITLE}}<br>{{MY_SIGNATURE}}</p>\n\n</td>\n\n</tr>\n\n<!-- Divider image -->\n\n<tr>\n\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n\n</tr>\n\n<!-- Footer -->\n\n<tr>\n\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot d>\n<td style=\"padding: 6px 0; text-align: center; width: 50%;\">&asymp; $ USD</td>\n</tr>\n<tr>\n<td style=\"padding: 6px 0; text-align: center; width: 50%;\"><strong>Start Date:</strong></td>\n<td style=\"padding: 6px 0; text-align: center; width: 50%;\">{{START_DATE}}</td>\n</tr>\n</tbody>\n</table>\n</div>\n<p style=\"font-size: 15px; line-height: 22px;\">A detailed description of the benefits we offer at Mitratech is attached to this email for your review.</p>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 14px;\">If you are in agreement with the terms outlined above, kindly <strong>reply to this email with your acceptance</strong>. Upon your confirmation and final approval, we will proceed to send you:</p>\n<!-- Next steps list -->\n<table style=\"margin: 0 0 20px 8px;\" role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 11px; font-weight: bold;\">1</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5; padding-bottom: 8px;\">The formal offer letter</td>\n</tr>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 11px; font-weight: bold;\">2</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5; padding-bottom: 8px;\">A form to initiate your IT equipment request</td>\n</tr>\n<tr>\n<td style=\"vertical-align: top; padding-right: 10px;\">\n<div style=\"width: 20px; height: 20px; background: #0bb3d6; border-radius: 50%; text-align: center; line-height: 20px; color: #fff; font-size: 11px; font-weight: bold;\">3</div>\n</td>\n<td style=\"font-size: 14px; color: #334155; line-height: 1.5;\">Additional onboarding details</td>\n</tr>\n</tbody>\n</table>\n<!-- Questions / Call box -->\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody>\n<tr>\n<td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">💬 <strong>Have any questions?</strong> We are happy to schedule a brief call to walk you through the details and answer anything you may need. Simply reply to this email and we will find a time that works best for you.</td>\n</tr>\n</tbody>\n</table>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0 0 24px;\">We look forward to hearing from you and are truly excited about the possibility of working together!</p>\n<p style=\"font-size: 15px; line-height: 1.6; margin: 0;\">Best regards,<br>{{MY_SIGNATURE}}</p>\n</td>\n</tr>\n<!-- Divider image -->\n<tr>\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n</tr>\n<!-- Footer -->\n<tr>\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n</tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>", "subject": null}, {"id": "t28", "intent": "Background Check & Onboarding", "stage": "PostOffer", "region": "MX", "name": "Background Check Stage", "subject": "Welcome to Mitratech - {{CANDIDATE_NAME}}", "desc": "Sent after offer acceptance to a Mexico-based new hire: recaps offer details and kicks off the background check (CURP) and new-hire paperwork. CAD/US versions pending real process details.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"padding: 24px;\" align=\"center\">\n\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody><!-- Header -->\n\n<tr>\n\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n\n</tr>\n\n<!-- Hero -->\n\n<tr>\n\n<td style=\"background: linear-gradient(180deg,#0bb3d6 0%, #6ad6e6 100%); padding: 30px 24px; text-align: center; color: #ffffff;\">\n\n<div style=\"font-size: 26px; font-weight: 800; font-family: Segoe UI,Roboto,Arial;\">Welcome to Mitratech! ✨</div>\n\n<div style=\"font-size: 15px; margin-top: 6px;\">We&rsquo;re excited for you to join our team</div>\n\n</td>\n\n</tr>\n\n<!-- Body -->\n\n<tr>\n\n<td class=\"px py\" style=\"padding: 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_NAME}},</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you for your continued interest and your patience! We are very excited to welcome you to <strong>Mitratech</strong> and are looking forward to your start, please review your job offer details carefully.</p>\n\n<!-- 🔥 OFFER DETAILS BOX -->\n\n<div style=\"margin: 18px 0; border: 2px solid #0bb3d6; background: #f0fbff; border-radius: 14px; padding: 16px 18px;\">\n\n<div style=\"font-size: 16px; font-weight: 800; margin-bottom: 10px; text-align: center;\">📄 Job Offer Details</div>\n\n<table style=\"font-size: 14px; line-height: 20px;\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"padding: 6px 0px; text-align: center; width: 49.962%;\"><strong>Position:</strong></td>\n\n<td style=\"padding: 6px 0px; text-align: center; width: 49.9615%;\">{{JOB_NAME}}</td>\n\n</tr>\n\n<tr>\n\n<td style=\"padding: 6px 0px; text-align: center; width: 49.962%;\"><strong>Monthly Gross Salary:</strong></td>\n\n<td style=\"padding: 6px 0px; text-align: center; width: 49.9615%;\">$00,000.00 MXN</td>\n\n</tr>\n\n<tr>\n\n<td style=\"padding: 6px 0px; text-align: center; width: 49.962%;\"><strong>Start Date:</strong></td>\n\n<td style=\"padding: 6px 0px; text-align: center; width: 49.9615%;\">{{START_DATE}}</td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n</div>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Attached to this email you&rsquo;ll find our <strong>Benefits Guide</strong> and a <strong data-start=\"195\" data-end=\"224\">Document Collection Guide</strong>, which includes instructions on how to gather and submit your required documentation.</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Once you&rsquo;ve reviewed the information, please complete the following steps:</p>\n\n<!-- Steps -->\n\n<table style=\"border-spacing: 0 10px;\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"border: 1px solid rgb(230, 244, 247); border-radius: 12px; padding: 14px; text-align: center;\"><span style=\"font-size: 14px;\"><strong>Background Check</strong></span><br><span style=\"font-size: 14px;\">Please go to <strong>the link below</strong> and input your CURP information.</span>\n\n<div style=\"margin-top: 10px;\"><a style=\"background: #0bb3d6; color: #ffffff; text-decoration: none; padding: 10px 18px; border-radius: 999px; font-weight: bold; display: inline-block;\" href=\"https://forms.gle/d6baKCxymDsxWPHt6\" target=\"_blank\" rel=\"noopener\"> Start Background Check </a></div>\n\n</td>\n\n</tr>\n\n<tr>\n\n<td style=\"border: 1px solid rgb(230, 244, 247); border-radius: 12px; padding: 14px; text-align: center;\"><span style=\"font-size: 14px;\"><strong>New Hire Information</strong></span><br><span style=\"font-size: 14px;\">Review the attached document and complete the New Hire Information form so we can prepare your documentation and have everything ready for your first day.</span>\n\n<div style=\"margin-top: 10px; text-align: center;\"><a style=\"background: #e8fbff; color: #0b7ea3; text-decoration: none; padding: 10px 18px; border-radius: 999px; font-weight: bold; display: inline-block;\" href=\"https://forms.gle/d6baKCxymDsxWPHt6\" target=\"_blank\" rel=\"noopener\"> Complete New Hire Info </a></div>\n\n</td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n<p style=\"font-size: 15px; line-height: 22px; margin-top: 16px;\">After you complete these steps, we will send you the Employment Agreement via DocuSign. Please review it carefully.</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Welcome again to the team &mdash; we can&rsquo;t wait to have you on board.</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">If you have any questions, please let me know. Thanks!</p>\n\n</td>\n\n</tr>\n\n<!-- Divider image -->\n\n<tr>\n\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n\n</tr>\n\n<!-- Footer -->\n\n<tr>\n\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n</td>\n\n</tr>\n\n</tbody>\n\n</table>"}, {"id": "t30", "intent": "Application Received", "stage": "NewApplicant", "region": "All", "name": "Application Received Auto-Reply", "subject": "Thank you for applying to {{COMPANY}}", "desc": "Confirms receipt the moment a candidate applies. Fills the one gap that had no template. Adapted from Greenhouse's global default (typo fixed, kept Mitratech-signed).", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hello {{CANDIDATE_FIRST_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Thank you for applying for the <strong>{{JOB_NAME}}</strong> position at {{COMPANY}}. We truly appreciate your interest in joining our team.</p><p style=\"font-size: 15px; line-height: 22px;\">We've received your application and our team is currently reviewing all submissions. If your background aligns with what we're looking for, we'll be in touch to discuss next steps.</p><p style=\"font-size: 15px; line-height: 22px;\">In the meantime, we invite you to explore our website to learn more about our mission and values.</p><p style=\"font-size: 15px; line-height: 22px;\">Kind regards,<br>Mitratech Talent Acquisition Team</p><p style=\"font-size:12px;color:#94a3b8;\">Please note: this mailbox is unattended. Replies will not be read.</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "t35", "intent": "Application Follow-Up", "stage": "Reviewing", "region": "All", "name": "Missing Application Info Request", "subject": "Information Request for {{COMPANY}}", "desc": "Sent when there's no formal application on file yet and a few details are still needed.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Thanks for your interest in the <strong>{{JOB_NAME}}</strong> position at {{COMPANY}}. Since we don't have a formal application from you on file, we have a few outstanding questions.</p><p style=\"font-size: 15px; line-height: 22px;\">Please use this link to submit additional information: {{SUBMISSION_LINK}}</p><p style=\"font-size: 15px; line-height: 22px;\">Regards,<br>{{MY_SIGNATURE}}</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "t36", "intent": "Referral Flow", "stage": "Reviewing", "region": "All", "name": "Referral – Application & Screen Request", "subject": "Next steps with Mitratech", "desc": "Referral-specific flow combining the formal application ask with scheduling a screen call.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Thank you for your interest in the <strong
