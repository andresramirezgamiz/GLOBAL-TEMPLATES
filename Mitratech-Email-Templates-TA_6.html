<script type="application/json" id="global-data">[{"name": "Default Agency Job Assignment Notification", "subject": "{{COMPANY}} assigned you to the {{JOB_NAME}} job", "body": "Hi,\n\n{{MY_FULL_NAME}} from {{COMPANY}} has assigned you to the {{JOB_NAME}} job. You can now view this job and submit candidates to it via the agency portal.\n\nLog in here to get started: app.greenhouse.io\n\nThe Greenhouse Team\napp.greenhouse.io\n\n© 2020 Greenhouse / 18 West 18th Street, 9th Floor, New York, NY 10011, USA", "stage": "OutOfScope", "verdict": "OUT_OF_SCOPE", "reason": "Greenhouse's own agency-portal notification, unbranded, addressed to external staffing agencies — not a Mitratech candidate email.", "replaces_id": null}, {"name": "Default Request Interview with Calendly", "subject": "{{COMPANY}} Interview Request", "body": "{{CANDIDATE_FIRST_NAME}},\n\nThanks for your interest in the {{JOB_NAME}} position at {{COMPANY}}. We're excited to move forward with the interview process.\n\nTo help us schedule your next interview(s), please select a time through the Calendly link below.\n\nRegards,\n{{MY_FIRST_NAME}}", "stage": "Assessment", "verdict": "DUPLICATE", "reason": "Same purpose as Availability Request / Next Interview Process, unbranded plain text.", "replaces_id": null}, {"name": "Default Candidate Availability Request Message", "subject": "{{COMPANY}} {{JOB_NAME}} Interview Availability", "body": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"padding: 24px;\" align=\"center\">\n\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody><!-- Header -->\n\n<tr>\n\n<td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td>\n\n</tr>\n\n<!-- Body -->\n\n<tr>\n\n<td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Thank you again for your interest in <strong>{{JOB_NAME}}</strong> at Mitratech! We're excited to move forward with the interview process.</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">The next step will be a conversation with me, where I'd love to learn more about your background and experience while also sharing additional details about Mitratech.</p>\n\n<!-- Info box -->\n\n<table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"background: #f0fbff; border: 2px solid #0bb3d6; border-radius: 14px; padding: 16px 20px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a; text-align: center;\">I've shared my available times below &mdash; please select <strong>all the options that work best for you</strong>. This will help us find the most convenient time to schedule the interview.</td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n<!-- CTA Button -->\n\n<table role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n\n<tbody>\n\n<tr>\n\n<td style=\"padding: 4px 0 24px;\" align=\"center\">{{AVAILABILITY_SUBMISSION_LINK}}</td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Looking forward to our conversation!</p>\n\n<p style=\"font-size: 15px; line-height: 22px;\">Regards,<br>{{MY_SIGNATURE}}</p>\n\n</td>\n\n</tr>\n\n<!-- Divider image -->\n\n<tr>\n\n<td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td>\n\n</tr>\n\n<!-- Footer -->\n\n<tr>\n\n<td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td>\n\n</tr>\n\n</tbody>\n\n</table>\n\n</td>\n\n</tr>\n\n</tbody>\n\n</table>", "stage": "Screening", "verdict": "REPLACED", "reason": "Already standardized — this is the current “Availability Request (First Ask)” template, word for word.", "replaces_id": "t20"}, {"name": "2nd Interview Availability", "subject": "Mitratech - Next Steps Availability - {{JOB_NAME}}", "body": "Hi {{CANDIDATE_FIRST_NAME}}\n\nI hope you're doing well! I wanted to follow up and let you know that [Hiring Manager's Name] really enjoyed meeting with you and was impressed by your background. We’d love to have you move forward in the process and meet with a few more team members to dive deeper into some key areas.\n\nPlease let me know your availability over the next few days, along with your time zone, and I'll coordinate the next steps from there.\n\nLooking forward to hearing from you!\n\nBest regards,  \n{{MY_FULL_NAME}}", "stage": "Assessment", "verdict": "BROKEN", "reason": "Contains a literal unfilled placeholder — “[Hiring Manager's Name]” — left as bracket text instead of a merge tag. Also duplicates Next Interview Process.", "replaces_id": null}, {"name": "Assessment Reminder", "subject": "Follow up to your Recent Application", "body": "Hi {{CANDIDATE_FIRST_NAME}},\nI'm following up regarding your initial application for Mitratech's {{JOB_NAME}} position. We emailed over a link to an online assessment which will need to be completed before the hiring team can review your full application to determine next steps in the recruiting process. Please try to complete that within the next couple days so that there is no further delay in moving forward. If you are unable to locate that assessment email, please let me know as soon as possible so I can get a new one over to you.\nIf for some reason you're no longer available or interested in being considered, please reply with a quick note and we can close out your application. \nWe look forward to considering you further! \nKind regards, \n{{MY_FIRST_NAME}}\nRecruiting Team\n{{COMPANY}}", "stage": "Assessment", "verdict": "NEW_GAP", "reason": "Legitimate nudge to complete a pending assessment link — we don't have an equivalent yet.", "replaces_id": null}, {"name": "Document Request", "subject": "Mitratech| Document Request", "body": "Hi {{CANDIDATE_FIRST_NAME}},\n\nCongratulations again on completing all of your interviews! We're thrilled to be moving forward with your offer.\n\nTo proceed, please provide the following documents at your earliest convenience:\n\n-   Current company's offer letter-\n-   Last three months' salary slips-\n-   Last appraisal letter-\n-   Any other offers you currently hold-\n-   LinkedIn profile link-\n-   Passport-size photo-\n-   Relieving letter (if you have already been relieved from your services)-\n-   UAN service history-\n\nHow to Download Your UAN Service History\n\nTo download your UAN service history, please follow these steps:\n\n1.  Log in to the UAN Member Portal. You will need your UAN, Password, and Captcha. \n2.  After successful login Via OTP verification, navigate to 'View' and select 'Service History'.\n3.  On the service history page, click the 'Download PDF' option.\n\nPlease send all the documents as PDF attachments in your reply. Once we receive them, we can proceed with the salary discussion and finalize your offer.\n\nWe look forward to hearing from you.\n\nRegards,\n{{RECRUITER}}", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "India-specific document collection (UAN service history, salary slips, etc.). Real compliance content — recommend confirming details with India HR before rebranding, not rewriting from scratch.", "replaces_id": null}, {"name": "Formal Offer Signed", "subject": "Mitratech Onboarding Process", "body": "Hi {{CANDIDATE_FIRST_NAME}},\n\nWe’re so excited for you to join Mitratech! Please see below for a couple of key items that you should look out for between now and your first day:  \n\n-   ADP Onboarding\n-   Benefit Summary\n-   Background Verification Emails\n-   Welcome email from the Manager\n-   Mitratech Equipment Details\n\nIf you have any questions between now and your start date, please contact Talent Acquisition Team or HR@mitratech.com. \nRegards,\n{{RECRUITER}}", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "General (non-region-specific) onboarding checklist overview once the offer is signed.", "replaces_id": null}, {"name": "Greenhouse User Access & Intro", "subject": "Greenhouse User Access & Intro", "body": "Hi,\n\nWelcome to Mitratech!! We’re thrilled to have you on the team and I hope you’re off to a great start.\n\nThis message is to let you know that we’ve created your account in Greenhouse and you should have received a notification email asking you log in and create your password for future access. Greenhouse is our Applicant Tracking System we use to manage & document the recruiting process, as well as tracking & documenting employee referrals. The latter is most important for you because the people & culture are truly what makes Mitratech a great company and the best way for us to continue building on that is through referrals from employees like YOU!!\n\nadditionally…and possibly more importantly J… we have a great employee referral program where you can earn a bonus of $1,000 / £800 / €750 / AU $1,500 /₹35,000 / MEX15,000! \n\nEven if you refer someone that isn’t hired, you’re still able to accrue referral points that can be cashed in for $25 / £25 / €25 / AU $25 / ₹1,750 / MEX500\n\nI’ve included additional details on our referral program below, as well as helpful links for using Greenhouse to submit referrals and share our open job posts on social media – this is an EASY way of leveraging your connections on social media to rack up referral points & bonuses!\n\nIf you have any questions, please don’t hesitate to reach out to recruiting@mitratech.com and someone on the team will get back to you ASAP.\n\nMitratech Referral Program:\n\n-   You refer a qualified candidate and they make it to first Face-to-Face stage you will be eligible for 50 points\n-   For every 100 points you accumulate, you will be eligible for a gift card worth $25 / £25 / €25 / AU $25 / ₹1,750 / MEX500 gift card \n-   If any of your referrals get hired and remain for six months, you receive $1,000 / £800 / €750 / AU $1,500 /₹35,000 / MEX15,000! \n-   Rehires – should you refer a former employee of Mitratech. You will be eligible for 50% of the local currency referral value (ie. US employee refers a former UK employee. US employee receives£400 / $500 after 6 months)\n-   How to refer candidates (Video)\n\nSharing through Social Media:\n\n-   Candidates who apply through an employee's social media job posting are still eligible referrals for the program!\n-   You can only share an individual job once per day, so you can post multiple times a day as long as each posting is for a different role.\n-   How to share jobs on social media (Video)\n\nOther details:\n\n-   Managers cannot receive credit for referring candidates to open roles that would directly report to them.\n\nKind Regards,\n\nMitratech TA team", "stage": "OutOfScope", "verdict": "OUT_OF_SCOPE", "reason": "Internal new-hire message about system access and the referral bonus program — not part of the candidate pipeline.", "replaces_id": null}, {"name": "INTERVIEW CONFIRMATION", "subject": "Mitratech - Interview Confirmation", "body": "Hi {{CANDIDATE_FIRST_NAME}},\n\nThank you so much for sharing your availability with me! Here are the details of your interview schedule for the {{JOB_NAME}} role :\n\nSCHEDULE: \n\n-    \n\nYou can use the link below to join the meeting:\n\n \n\n \n\nPlease send a quick reply to let me know you've received this email. If you have any questions, don't hesitate to let me know. \n\n \n\nWarmly,\n\n{{MY_FULL_NAME}}", "stage": "Assessment", "verdict": "BROKEN", "reason": "The schedule and meeting-link lines are blank with no merge tags at all; recruiters must hand-type them every time. Duplicates our Candidate Interview Confirmation, which already does this correctly.", "replaces_id": null}, {"name": "New Hire - Terms of the Offer - US", "subject": "Mitratech - Terms of the Offer for {{CANDIDATE_NAME}}", "body": "Hello {{CANDIDATE_NAME}},\n\nIt was wonderful speaking with you this *morning/afternoon.  I was so excited to have presented you with the offer to join us at Mitratech. Congratulations!!\n\nAs discussed, enclosed are the terms of the offer for your review.  I’ve also provided a summary of our benefits.   The detailed package of benefits will accompany the formal offer letter. \n\nIf you wish to agree to the terms, please call or email me with your verbal acceptance. To follow, will be the official offer letter via docusign.\n\nCANDIDATE:      xxxx xxxxx\n\nTITLE:                xxxxx \n\nREPORTING TO: xxxxx\n\nSTART DATE:     TBD \n\nBASE SALARY:  $000.00 \n\nBONUS: %\n\nComputer preference: \n\nSummary of other benefits:\n\nMitratech's benefits information: We partner with ADP, our onboarding and payroll provider.  Health insurance options (medical, vision, dental), FSA/HSA, employee assistance program, pet insurance and other components of our benefits package will be presented in the offer letter.  We offer employee and dependent coverage on the first of the month following your start date.\n\nHighlights of the 401K program: We partner with Fidelity for our 401K benefit; we match 50% up to 6% of an employees annual salary and employees are 100% vested in your Rollover Contributions, Employer Matching Contributions, Qualified Matching Contributions, Deferral Contributions and any earnings thereon. \n\nEmployee Perks:  Unlimited PTO, Employee Recognition Program, Discount Programs and much more!", "stage": "Offer", "verdict": "BROKEN", "reason": "Uses manual fill-in placeholders (“xxxx xxxxx”, “TBD”, “$000.00”) instead of merge tags — easy to send unedited by mistake. Duplicates the US Pre-Offer.", "replaces_id": null}, {"name": "Onboarding (IND) 1 - Paylocity Paper Work", "subject": "[IMPORTANT] Onboarding Paper Work - Mitratech India LLP", "body": "Hello {{CANDIDATE_NAME}},\n\n\"Welcome to the team! We are thrilled to have you on board.\n\nMy name is Bhuvanesh, and I work as an HR Assistant at Mitratech. I handle the employee onboarding and background verification process.\n\nThis email will guide and assist you in completing your onboarding tasks in Paylocity. To get you started, we’ve outlined the steps below.\n\nPlease complete these tasks through a web browser on a desktop or laptop, as the mobile app currently does not support all the features required for onboarding.\n\nStep 1: Access Your Account\nYou should have received an email from do-not-reply@paylocity.com with your temporary login details.\n\n-   Log In: Use those temporary credentials at the Paylocity portal.\n-   Secure Your Account: Create a new password and complete the setup process.\n-   Find Your ID: Your official Associate ID is { }. Please use this whenever a form asks for an \"Employee Code.\"\n\nStep 2: Complete Your Onboarding Tasks\nOnce logged in, you will see a list of tasks. Most are straightforward, but a few require manual steps:\n\nForm-Specific Instructions:\n\n-   Form 2 (EPFO Nomination) & Form F (Gratuity Nomination): These must be handled manually. Download them from the portal, print them, sign them, and upload the scanned copies in PDF format.\n\n-   Reference Samples: I have attached sample nomination forms for your reference. Please review them if you have any questions while filling out your forms.\n\n-   EPFO Form 11: Use Mitratech India LLP as the Company Name.\n\n-   Employees’ Pension Scheme Section:\n\n    -   Check your previous PF passbook. If you see contributions under the \"Pension Share\" column, you are eligible to continue those contributions with us.\n    -   If you do not have a Scheme Certificate or PPO Number, please mark those fields as NA.\n\nDocument Uploads:\n\n-   Ensure all uploads are in PDF format.\n-   Payslips: Merge your last three months of payslips into a single PDF file.\n-   Relieving Letter: If unavailable, your resignation confirmation will suffice for now. You may submit the relieving letter later.\n\nPlease feel free to reach out @9381155650 in case of any queries.\n\n \n\nMany thanks,  \n\nBhuvanesh Eepuri\n\nHR Team", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "Real India onboarding steps (EPFO/Gratuity forms). Hardcodes one HR employee's name instead of {{MY_SIGNATURE}} — fix that, keep the process content as-is pending India HR confirmation.", "replaces_id": null}, {"name": "Onboarding (IND) 2 - Background Verification and Action Items", "subject": "Background Verification Instructions – Mitratech Onboarding", "body": "Dear{{CANDIDATE_NAME}},\n\nGreetings from Mitratech!\n\nAs part of the onboarding process, it is mandatory to complete your background verification (BGV) before your joining date. You will receive an email from Ongrid containing a secure link to begin this process.\n\nKindly follow the instructions in the email to fill out the questionnaire and upload the required documents.\n\nPlease keep the following documents ready:\n\n-   Valid National Identity Proof\n-   Educational Certificates (Highest degree)\n-   Employment Records (offer letters, relieving letters, salary slips, of mentioned employments.)\n-   Proof of Address\n\nEmployment details of organizations to be filled:\n\n-   Organization Name\n-    \n-    \n\nNote:\n\n-   Once you submit, no changes can be made. Please ensure all details are accurate and documents are correct before submitting.\n-   For employment verification, please enter only the HR contact details of your previous employers. Kindly refrain from entering reporting manager or any other non-HR references.\n\nPlease feel free to reach out if you have any questions or facing any issues during the process.\n\n \n\nWarm regards,\nBhuvanesh\nHR Assistant | Mitratech", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "Real India background-verification steps. Same hardcoded-name issue, plus a missing space in “Dear{{CANDIDATE_NAME}}.”", "replaces_id": null}, {"name": "Onboarding (IND) 2 - Day 1 Expectations", "subject": "Mitratech Day 1 Expectations", "body": "Hello{{CANDIDATE_NAME}},\n\nWe are thrilled to have you join the team! To help you get started smoothly, here’s what to expect on your first day and how to prepare.\n\nCredentials & Setup\n\nOn the morning of your first day, please keep an eye on your personal inbox. You will receive two documents from my end:\n\n-   IT Welcome Sheet: Instructions for setting up your Mitratech email, calendar, and Office 365 (our hub for intranet and chat), along with the credentials to log in to your laptop.\n-   HR Welcome Sheet: An overview of initial tasks and company resources.\n\nYour First Day Schedule\n\nPlease plan to log in by 12:00 PM to begin your onboarding:\n\n-   12:00 PM – 12:30 PM: Follow the IT Welcome Sheet to set up your email and calendar.\n-   Post-Setup: Check your calendar for your 1:1 meeting with your manager.\n\nNote: Please ensure your email and calendar are set up before this meeting, as your manager will use the time to discuss expectations and your upcoming plan.\n\nNext Steps with HR\n\nOver your first few days, I will reach out to you to:\n\n-   Finalize any remaining paperwork.\n-   Conduct a comprehensive review of Mitratech’s benefits.\n\nIf you have any questions before your joining day, please feel free to reach out. Looking forward to seeing you!\n\n \n\nBest Regards, \n\nBhuvanesh E\n\nHR Team", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "Real India Day-1 logistics. Same hardcoded-name issue and missing-space typo.", "replaces_id": null}, {"name": "Onboarding (MX) 1 - After Signed EA", "subject": "Mitratech Onboarding Process", "body": "Hola {{CANDIDATE_FIRST_NAME}},\n\nWe’re so excited for you to join Mitratech!\n\nPlease see below for a few key items that you should look out for between now and your first day {{START_DATE}}:\n\n-   About 3 business days before your start date, you will receive a reminder about first-day expectations and start time.\n-   You will receive the company laptop 1-2 business days before your start date. More details will be sent through DHL emails.\n-   The early morning of your first day, you will get an IT Welcome Sheet with details to set up your Mitratech email account, and an HR Welcome Sheet to provide general onboarding items. You should also have your equipment by this time so you can set up all necessary accounts.\n-   Within your first few days, you will meet with your manager to review role details, onboarding plans, and general expectations. You will also connect with HR and Training to discuss additional onboarding activities.\n\nIf you have any questions between now and your start date, please reach out to me or your manager (copied).\n\nThanks,\n\n{{MY_FIRST_NAME}}\n\n{{MY_JOB_TITLE}}\n\n{{MY_SIGNATURE}}", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "Clean content, already uses proper merge tags — just needs the standard branding applied.", "replaces_id": null}, {"name": "Onboarding (MX) 2 - Welcome Reminders", "subject": "Mitratech First Day Expectations", "body": "Hello {{CANDIDATE_FIRST_NAME}},\n\nWe are excited about your joining next week on {{START_DATE}}!\n\n-   HR will check in with you during the first few days to finalize any paperwork if needed, and also please look out for a meeting invite to a presentation to review Mitratech’s benefits.\n-   By the end of this week, you should be receiving your laptop. Please don't turn on your laptop until you receive the instructions on Monday.\n-   On the morning of your first day, you will receive an IT Welcome Sheet, providing you with details on how to set up your email, calendar, and Office365 account (our system used for intranet and chat).\n-   On your first day, please log in by 7:00 am local time, and spend the first half an hour setting up your Mitratech email and calendar.\n-   You will also have a 1:1 with your manager, so it is critical you have logged into your email and calendar and can view details for that invite. In this meeting with your manager, they will review general expectations and what your first several weeks will look like.\n\nPlease keep an eye out for your IT and HR Welcome Sheets that will be sent in the early morning of your first day.\n\nIf any questions, please let me know.\n\n{{MY_FIRST_NAME}}\n\n{{MY_JOB_TITLE}}\n\n{{MY_SIGNATURE}}", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "Clean content, already uses proper merge tags — just needs the standard branding applied.", "replaces_id": null}, {"name": "Onboarding (US) 1 - After Signed Offer", "subject": "Mitratech Onboarding Process", "body": "Hello {{CANDIDATE_FIRST_NAME}},  \nWe’re so excited for you to join Mitratech! [Short intro about yourself – name, title, location, etc]. \n\nBelow is a list of items that you should look out for between now and your first day.\n\n-   You should have received a request from our background check vendor, AssureHire. If you provided your cell phone number, you will also receive a text message reminder. Note that we require employment verification for the previous 7 years. Please complete by the end of the week.\n-   ADP Onboarding: Soon you will be receiving 2 emails (sent to your personal email address) from ADP, our onboarding and payroll provider. One will contain your Associate ID and the other your Personal Registration Code, both of which you will need to sign up and register your account. Please follow the instructions in the emails to complete your registration and to begin the onboarding process.\n-   I have also attached a benefits summary for your reference. HR will discuss our plans in more detail and answer any questions you have in your first week.\n-   The early morning of your first day, you will get an IT Welcome Sheet with details to set up your Mitratech email account, and a HR Welcome Sheet to provide general onboarding items. You should also have your equipment by this time so you can set up all necessary accounts\n-   Your Mitratech laptop will be shipped the week before you start and typically arrives 1-2 days before your start date. Any additional equipment requested such as monitors and a docking station will be shipped after you start, depending on availability of those items.\n\nIf you have any questions between now and your start date, please reach out to your manager (copied) or HR@mitratech.com.\n\nThanks,\n\n{{MY_FIRST_NAME}}\n\n{{MY_JOB_TITLE}}\n\n{{MY_SIGNATURE}}", "stage": "PostOffer", "verdict": "NEW_GAP", "reason": "Clean content overall; has one leftover bracket instruction — “[Short intro about yourself…]” — to remove. Needs branding.", "replaces_id": null}, {"name": "Onboarding (US) 2 - ADP Reminder", "subject": "ADP Onboarding Steps", "body": "Hi {{CANDIDATE_FIRST_NAME}},\n\nAs a reminder, you should have received 2 emails from ADP in order to register for your ADP account. Once logged in, you will be prompted to complete your New Hire onboarding experience, please be sure to complete all steps of the Onboarding experience.\n\nQuick notes on your Form I9:\n\n-   When you get to the request to upload your I9 documents, you will need to upload files which include images of the front AND back of your approved documents. Options for your documents can be found here: Form I-9 Acceptable Document </tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "prop-global-referral-formal", "stage": "Reviewing", "intent": "Referral Flow", "region": "All", "name": "Referral – Formal Application Request", "subject": "Mitratech Employment Application", "desc": "Referral-specific flow, application step only.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Thank you for your interest in the <strong>{{JOB_NAME}}</strong> opportunity with us! As the first step, please complete the formal employment application: {{SUBMISSION_LINK}}</p><p style=\"font-size: 15px; line-height: 22px;\">If you have questions or need accommodations, contact us at recruiting@mitratech.com.</p><p style=\"font-size: 15px; line-height: 22px;\">Thank you!<br>Mitratech Recruiting Team</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a styl ttps://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody>\n</table>\n</td>\n</tr>\n</tbody>\n</table>"}, {"id": "prop-IND-docrequest", "stage": "PostOffer", "intent": "Background Check & Onboarding", "region": "IND", "draft": false, "name": "Document Request (Post-Offer)", "subject": "Mitratech | Document Request", "desc": "Real India process: requests offer-stage documents including UAN service history. Content preserved from the live process, only branding applied.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Congratulations again on completing all of your interviews! We're thrilled to be moving forward with your offer.</p><p style=\"font-size: 15px; line-height: 22px;\">To proceed, please provide the following documents at your earliest convenience:</p><ul style=\"font-size:14px; line-height:1.7; color:#334155;\"><li>Current company's offer letter</li><li>Last three months' salary slips</li><li>Last appraisal letter</li><li>Any other offers you currently hold</li><li>LinkedIn profile link</li><li>Passport-size photo</li><li>Relieving letter (if applicable)</li><li>UAN service history</li></ul><table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\"><tbody><tr><td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\"><strong>How to download your UAN service history:</strong> Log in to the UAN Member Portal &rarr; View &rarr; Service History &rarr; Download PDF.</td></tr></tbody></table><p style=\"font-size: 15px; line-height: 22px;\">Please send all documents as PDF attachments in your reply. Once received, we can proceed with the salary discussion and finalize your offer.</p><p style=\"font-size: 15px; line-height: 22px;\">Regards,<br>{{MY_SIGNATURE}}</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "prop-IND-paylocity", "stage": "PostOffer", "intent": "Background Check & Onboarding", "region": "IND", "draft": false, "name": "Onboarding 1 – Paylocity Paperwork", "subject": "[IMPORTANT] Onboarding Paper Work - Mitratech India LLP", "desc": "Real India process: Paylocity account setup, EPFO/Gratuity nomination forms. Content preserved, branding applied, no longer signed by one specific HR employee.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hello {{CANDIDATE_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Welcome to the team! We are thrilled to have you on board. This email will guide you through completing your onboarding tasks in Paylocity.</p><table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\"><tbody><tr><td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\"><strong>Step 1:</strong> Log in to Paylocity with the temporary credentials from do-not-reply@paylocity.com, then set a new password. Your Associate ID is <strong>{{EMPLOYEE_ID}}</strong>.</td></tr></tbody></table><table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\"><tbody><tr><td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\"><strong>Step 2:</strong> Form 2 (EPFO Nomination) and Form F (Gratuity Nomination) must be downloaded, signed, and re-uploaded as PDFs. Use “Mitratech India LLP” as the Company Name on EPFO Form 11.</td></tr></tbody></table><p style=\"font-size: 15px; line-height: 22px;\">Ensure all uploads are in PDF format. Merge your last three months of payslips into a single file.</p><p style=\"font-size: 15px; line-height: 22px;\">Please feel free to reach out with any questions.</p><p style=\"font-size: 15px; line-height: 22px;\">Many thanks,<br>{{MY_SIGNATURE}}<br>HR Team</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "prop-IND-bgv", "stage": "PostOffer", "intent": "Background Check & Onboarding", "region": "IND", "draft": false, "name": "Onboarding 2 – Background Verification", "subject": "Background Verification Instructions – Mitratech Onboarding", "desc": "Real India process: mandatory background verification (BGV) via Ongrid before the joining date. Content preserved, branding applied.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Dear {{CANDIDATE_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Greetings from Mitratech! As part of onboarding, it is mandatory to complete your background verification (BGV) before your joining date. You will receive an email from Ongrid with a secure link to begin.</p><table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\"><tbody><tr><td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">Please keep ready: valid national identity proof, educational certificates, employment records, and proof of address.</td></tr></tbody></table><p style=\"font-size: 15px; line-height: 22px;\">Note: once submitted, no changes can be made — please ensure accuracy before submitting. For employment verification, provide only HR contact details of previous employers.</p><p style=\"font-size: 15px; line-height: 22px;\">Warm regards,<br>{{MY_SIGNATURE}}<br>HR Team</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "prop-IND-day1", "stage": "PostOffer", "intent": "Background Check & Onboarding", "region": "IND", "draft": false, "name": "Onboarding 3 – Day 1 Expectations", "subject": "Mitratech Day 1 Expectations", "desc": "Real India process: first-day login and schedule expectations. Content preserved, branding applied.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hello {{CANDIDATE_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">We are thrilled to have you join the team! Here's what to expect on your first day.</p><table style=\"margin: 20px 0;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\"><tbody><tr><td style=\"background: #f0fbff; border-left: 4px solid #0bb3d6; border-radius: 0 10px 10px 0; padding: 16px 18px; font-family: Segoe UI,Roboto,Arial; font-size: 15px; line-height: 1.6; color: #0f172a;\">On the morning of your first day, watch for your <strong>IT Welcome Sheet</strong> and <strong>HR Welcome Sheet</strong> by email. Please log in by 12:00 PM to begin setup.</td></tr></tbody></table><p style=\"font-size: 15px; line-height: 22px;\">After setup, check your calendar for your 1:1 with your manager, who will discuss expectations and your first weeks.</p><p style=\"font-size: 15px; line-height: 22px;\">Over your first few days, HR will follow up to finalize paperwork and review benefits.</p><p style=\"font-size: 15px; line-height: 22px;\">Best regards,<br>{{MY_SIGNATURE}}<br>HR Team</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}, {"id": "prop-IND-rejinterview-real", "stage": "Interviewing", "intent": "Rejection", "region": "IND", "draft": false, "name": "Rejection – After Interviews (India)", "subject": "Update on your Application at Mitratech", "desc": "India-specific post-interview rejection, content preserved from the live process.", "html": "<table style=\"background: #f6fbff;\" role=\"presentation\" width=\"100%\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"padding: 24px;\" align=\"center\">\n<table style=\"width: 600px; max-width: 600px; background: #ffffff; border-radius: 16px; box-shadow: 0 6px 24px rgba(16,24,40,.06); overflow: hidden;\" role=\"presentation\" width=\"600\" cellspacing=\"0\" cellpadding=\"0\">\n<tbody><tr><td style=\"background: #00b5d8; padding: 20px;\" align=\"center\"><img style=\"display: block; border: 0; max-width: 340px; width: 100%; height: auto;\" src=\"https://i.imgur.com/FxlIjFw.png\" alt=\"Mitratech\"></td></tr>\n<tr><td style=\"padding: 28px 24px; font-family: Segoe UI,Roboto,Arial; color: #0f172a;\">\n<p style=\"font-size: 15px; line-height: 22px;\">Hi {{CANDIDATE_FIRST_NAME}},</p><p style=\"font-size: 15px; line-height: 22px;\">Thank you so much for your interest in the <strong>{{JOB_NAME}}</strong> position with Mitratech India LLP. We appreciate you taking the time to interview with our team.</p><p style=\"font-size: 15px; line-height: 22px;\">While we were impressed with your skill set, we have chosen to proceed with another candidate who has more experience.</p><p style=\"font-size: 15px; line-height: 22px;\">Again, we appreciate your time, and we wish you the best of luck in your career endeavors.</p><p style=\"font-size: 15px; line-height: 22px;\">Regards,<br>{{MY_SIGNATURE}}</p>\n</td></tr>\n<tr><td style=\"padding: 0; line-height: 0;\" align=\"center\"><img style=\"display: block; width: 100%; max-width: 600px; border: 0;\" src=\"https://i.imgur.com/rAMWttC.png\" alt=\"\" width=\"600\"></td></tr>\n<tr><td style=\"background: #e8fbff; padding: 16px; text-align: center; font-size: 12px; font-family: Segoe UI,Roboto,Arial; color: #64748b;\">Talent Acquisition &middot; Mitratech<br><a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://mitratech.com/careers\">Careers</a> &middot; <a style=\"color: #0b7ea3; text-decoration: underline;\" href=\"https://www.linkedin.com/company/mitratech/\">LinkedIn</a></td></tr>\n</tbody></table></td></tr></tbody></table>"}]</script>

<script>
(function () {
  "use strict";

  var LS_KEY = "mitratech_ta_custom_templates_v1";
  var STAGES_KEY = "mitratech_ta_custom_stages_v1";
  var EDITS_KEY = "mitratech_ta_template_edits_v1";

  var BASE_STAGES = [];
  try { BASE_STAGES = JSON.parse(document.getElementById("stages-data").textContent); } catch (e) { BASE_STAGES = []; }

  var customStages = [];
  try { customStages = JSON.parse(localStorage.getItem(STAGES_KEY) || "[]"); } catch (e) { customStages = []; }

  function allStages() { return BASE_STAGES.concat(customStages); }
  function saveStages() {
    try { localStorage.setItem(STAGES_KEY, JSON.stringify(customStages)); } catch (e) {}
  }

  var INTENT_ORDER = {
    NewApplicant: ["Application Received"],
    Reviewing: ["Availability & Scheduling", "Follow-Up & Status", "Special Situations", "Rejection", "Application Follow-Up", "Referral Flow"],
    Screening: ["Availability & Scheduling", "Salary Confirmation", "Rejection"],
    Assessment: ["Availability & Scheduling", "Interview Confirmation"],
    Interviewing: ["Special Situations", "Rejection"],
    Offer: ["Pre-Offer"],
    PostOffer: ["Background Check & Onboarding"]
  };

  var REGION_COLORS = { All: "#64748b", CAD: "#0b7ea3", MX: "#0bb3d6", US: "#2563eb" };

  var BASE_TEMPLATES = [];
  try { BASE_TEMPLATES = JSON.parse(document.getElementById("base-data").textContent); } catch (e) { BASE_TEMPLATES = []; }

  var customTemplates = [];
  try { customTemplates = JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch (e) { customTemplates = []; }

  var edits = {};
  try { edits = JSON.parse(localStorage.getItem(EDITS_KEY) || "{}"); } catch (e) { edits = {}; }

  var AUDIT_DATA = [];
  try { AUDIT_DATA = JSON.parse(document.getElementById("audit-data").textContent); } catch (e) { AUDIT_DATA = []; }

  var activeStage = BASE_STAGES[0].key;
  var openItemIds = {};
  var editingId = null;
  var viewMode = "pipeline";
  var auditFilter = "ALL";

  function allTemplates() {
    var base = BASE_TEMPLATES.map(function (t) {
      return edits[t.id] ? Object.assign({}, t, edits[t.id], { edited: true }) : t;
    });
    return base.concat(customTemplates);
  }

  function saveCustom() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(customTemplates)); } catch (e) {}
  }

  function saveEdits() {
    try { localStorage.setItem(EDITS_KEY, JSON.stringify(edits)); } catch (e) {}
  }

  function esc(s) {
    return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  function regionColor(region) { return REGION_COLORS[region] || "#64748b"; }

  function showToast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(function () { t.classList.remove("show"); }, 3200);
  }

  // ---------------- Nav ----------------
  function renderNav() {
    var nav = document.getElementById("stageTabs");
    var all = allTemplates();
    var stages = allStages();
    var activeIdx = stages.findIndex(function (s) { return s.key === activeStage; });
    nav.innerHTML = stages.map(function (s, i) {
      var count = all.filter(function (t) { return t.stage === s.key; }).length;
      var cls = "stage-tab" + (s.key === activeStage ? " active" : (i < activeIdx ? " is-done" : ""));
      return '<button class="' + cls + '" data-stage="' + s.key + '">' +
        '<span class="step-num">' + (i + 1) + '</span>' +
        '<span>' + esc(s.navLabel) + '</span>' +
        '<span class="count-badge">' + count + '</span>' +
        (s.custom ? '<span class="stage-delete-x" data-remove-stage="' + esc(s.key) + '" title="Remove this stage">&times;</span>' : '') +
        '</button>';
    }).join("") + '<button class="stage-tab stage-add-tab" id="addStageBtn" title="Add a new pipeline stage">&#43;</button>';

    Array.prototype.forEach.call(nav.querySelectorAll(".stage-tab[data-stage]"), function (btn) {
      btn.addEventListener("click", function (e) {
        if (e.target && e.target.hasAttribute("data-remove-stage")) return;
        activeStage = btn.getAttribute("data-stage");
        openItemIds = {};
        renderNav();
        renderPage();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
    Array.prototype.forEach.call(nav.querySelectorAll("[data-remove-stage]"), function (el) {
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        var key = this.getAttribute("data-remove-stage");
        var count = allTemplates().filter(function (t) { return t.stage === key; }).length;
        if (count > 0) {
          alert("This stage still has " + count + " template(s). Move or delete them first.");
          return;
        }
        customStages = customStages.filter(function (s) { return s.key !== key; });
        saveStages();
        if (activeStage === key) activeStage = BASE_STAGES[0].key;
        renderNav();
        renderPage();
      });
    });
    var addStageBtn = document.getElementById("addStageBtn");
    if (addStageBtn) addStageBtn.addEventListener("click", openStageModal);
  }

  // ---------------- Page ----------------
  function itemTemplate(t) {
    var isCustom = !!t.custom;
    var isEdited = !!t.edited;
    return '<div class="accordion-item' + (openItemIds[t.id] ? ' open' : '') + '" data-id="' + esc(t.id) + '">' +
      '<div class="accordion-header" role="button" tabindex="0" data-action="toggle" data-id="' + esc(t.id) + '">' +
      '<span class="badge" style="background:' + regionColor(t.region) + '22;color:' + regionColor(t.region) + ';border:1px solid ' + regionColor(t.region) + '55;">' + esc(t.region) + '</span>' +
      '<span class="item-title">' + esc(t.name) + '</span>' +
      (isCustom ? '<span class="custom-flag">Added</span>' : '') +
      (isEdited ? '<span class="custom-flag edited-flag">Edited</span>' : '') +
      '<button class="icon-btn" data-action="edit" data-id="' + esc(t.id) + '" title="Edit this template">&#9998;</button>' +
      (isEdited ? '<button class="icon-btn" data-action="revert" data-id="' + esc(t.id) + '" title="Revert to original">&#8635;</button>' : '') +
      (isCustom ? '<button class="delete-x" data-action="delete" data-id="' + esc(t.id) + '" title="Remove this template">&times;</button>' : '') +
      '<span class="chevron">&#9662;</span>' +
      '</div>' +
      '<div class="accordion-body">' +
      '<p class="desc">' + esc(t.desc) + '</p>' +
      (t.subject ? '<p class="subject-line"><span>Subject</span>' + esc(t.subject) + '</p>' : '') +
      '<button class="toggle-btn" data-action="code" data-id="' + esc(t.id) + '">View HTML code</button>' +
      '<div class="preview-wrap"><iframe class="preview" data-role="preview" data-id="' + esc(t.id) + '"></iframe></div>' +
      '<pre class="code-block hidden" data-role="code" data-id="' + esc(t.id) + '"></pre>' +
      '</div></div>';
  }

  function renderPage() {
    var stages = allStages();
    var stage = stages.find(function (s) { return s.key === activeStage; });
    if (!stage) { stage = stages[0]; activeStage = stage.key; }
    var header = document.getElementById("pageHeader");
    var idx = stages.indexOf(stage) + 1;
    header.innerHTML =
      '<p class="eyebrow">Stage ' + idx + ' of ' + stages.length + '</p>' +
      '<h1>' + esc(stage.label) + '</h1>' +
      '<p>' + esc(stage.desc) + '</p>';

    var items = allTemplates().filter(function (t) { return t.stage === stage.key; });
    var content = document.getElementById("content");

    if (items.length === 0) {
      content.innerHTML = '<div class="empty-state">No email template exists yet for this stage.<br>' +
        '<button class="btn btn-amber" data-action="add-here">&#43; Add the first one</button></div>';
      wireEmptyState();
      return;
    }

    var order = (INTENT_ORDER[stage.key] || []).slice();
    var seen = {};
    items.forEach(function (t) {
      if (order.indexOf(t.intent) === -1) order.push(t.intent);
    });

    var html = "";
    order.forEach(function (intentName) {
      var groupItems = items.filter(function (t) { return t.intent === intentName; });
      if (groupItems.length === 0) return;
      html += '<div class="intent-group"><p class="intent-group__label">' + esc(intentName) + '</p>' +
        '<div class="accordion-list">' + groupItems.map(itemTemplate).join("") + '</div></div>';
    });
    content.innerHTML = html;

    // Wire iframes (srcdoc set via property to avoid any escaping issues)
    Array.prototype.forEach.call(content.querySelectorAll('iframe[data-role="preview"]'), function (frame) {
      var id = frame.getAttribute("data-id");
      var t = allTemplates().find(function (x) { return x.id === id; });
      if (t) frame.srcdoc = t.html;
    });
    Array.prototype.forEach.call(content.querySelectorAll('pre[data-role="code"]'), function (pre) {
      var id = pre.getAttribute("data-id");
      var t = allTemplates().find(function (x) { return x.id === id; });
      if (t) pre.textContent = t.html;
    });

    content.querySelectorAll("[data-action]").forEach(function (el) {
      el.addEventListener("click", handleContentAction);
    });
    content.querySelectorAll('[data-action="toggle"]').forEach(function (el) {
      el.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          handleContentAction.call(el, e);
        }
      });
    });
  }

  function wireEmptyState() {
    var btn = document.querySelector('[data-action="add-here"]');
    if (btn) btn.addEventListener("click", function () { openModal({ mode: "add", stage: activeStage }); });
  }

  function handleContentAction(e) {
    e.stopPropagation();
    var action = this.getAttribute("data-action");
    var id = this.getAttribute("data-id");
    if (action === "toggle") {
      openItemIds[id] = !openItemIds[id];
      var item = document.querySelector('.accordion-item[data-id="' + id + '"]');
      if (item) item.classList.toggle("open");
    } else if (action === "code") {
      var body = this.closest(".accordion-body");
      var codeEl = body.querySelector('[data-role="code"]');
      var previewWrap = body.querySelector(".preview-wrap");
      var showing = !codeEl.classList.contains("hidden");
      codeEl.classList.toggle("hidden");
      previewWrap.classList.toggle("hidden", !showing);
      this.textContent = showing ? "View HTML code" : "View preview";
    } else if (action === "delete") {
      if (confirm("Remove this template? This only removes it from this browser session until you re-export.")) {
        customTemplates = customTemplates.filter(function (t) { return t.id !== id; });
        saveCustom();
        renderNav();
        renderPage();
        showToast("Template removed.");
      }
    } else if (action === "edit") {
      openModal({ mode: "edit", id: id });
    } else if (action === "revert") {
      if (confirm("Revert this template to its original content?")) {
        delete edits[id];
        saveEdits();
        renderNav();
        renderPage();
        showToast("Template reverted to original.");
      }
    }
  }

  // ---------------- Modal ----------------
  function populateStageSelect() {
    var sel = document.getElementById("fStage");
    sel.innerHTML = allStages().map(function (s) { return '<option value="' + s.key + '">' + esc(s.label) + '</option>'; }).join("");
  }

  function populateIntentSelect(stageKey) {
    var sel = document.getElementById("fIntent");
    var known = (INTENT_ORDER[stageKey] || []).slice();
    allTemplates().filter(function (t) { return t.stage === stageKey; }).forEach(function (t) {
      if (known.indexOf(t.intent) === -1) known.push(t.intent);
    });
    var opts = known.map(function (k) { return '<option value="' + esc(k) + '">' + esc(k) + '</option>'; });
    opts.push('<option value="__new__">+ New category\u2026</option>');
    sel.innerHTML = opts.join("");
    document.getElementById("newIntentRow").classList.add("hidden");
  }

  function openModal(opts) {
    opts = opts || {};
    var isEdit = opts.mode === "edit";
    var tpl = isEdit ? allTemplates().find(function (t) { return t.id === opts.id; }) : null;
    editingId = isEdit && tpl ? tpl.id : null;

    document.getElementById("modalTitle").textContent = isEdit ? "Edit template" : "Add a new template";
    document.getElementById("submitBtnLabel").textContent = isEdit ? "Save Changes" : "Add Template";

    populateStageSelect();
    var stageVal = isEdit && tpl ? tpl.stage : (opts.stage || activeStage);
    document.getElementById("fStage").value = stageVal;
    populateIntentSelect(stageVal);
    if (isEdit && tpl && document.getElementById("fIntent").querySelector('option[value="' + CSS.escape(tpl.intent) + '"]') === null) {
      var extraOpt = document.createElement("option");
      extraOpt.value = tpl.intent;
      extraOpt.textContent = tpl.intent;
      document.getElementById("fIntent").insertBefore(extraOpt, document.getElementById("fIntent").firstChild);
    }
    document.getElementById("fIntent").value = isEdit && tpl ? tpl.intent : document.getElementById("fIntent").value;

    document.getElementById("fRegion").value = isEdit && tpl ? tpl.region : "All";
    document.getElementById("fName").value = isEdit && tpl ? tpl.name : "";
    document.getElementById("fSubject").value = isEdit && tpl && tpl.subject ? tpl.subject : "";
    document.getElementById("fDesc").value = isEdit && tpl ? tpl.desc : "";
    document.getElementById("fHtml").value = isEdit && tpl ? tpl.html : "";
    document.getElementById("fNewIntent").value = "";
    document.getElementById("newIntentRow").classList.add("hidden");
    document.getElementById("modalPreview").srcdoc = isEdit && tpl ? tpl.html : "";
    document.getElementById("modalOverlay").classList.remove("hidden");
  }

  function openStageModal() {
    document.getElementById("fStageName").value = "";
    document.getElementById("fStageDesc").value = "";
    document.getElementById("stageModalOverlay").classList.remove("hidden");
  }

  function closeStageModal() {
    document.getElementById("stageModalOverlay").classList.add("hidden");
  }

  function closeModal() {
    document.getElementById("modalOverlay").classList.add("hidden");
    editingId = null;
  }

  function initModal() {
    document.getElementById("addBtn").addEventListener("click", function () { openModal({ mode: "add", stage: activeStage }); });
    document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
    document.getElementById("cancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalOverlay").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });
    document.getElementById("stageModalCloseBtn").addEventListener("click", closeStageModal);
    document.getElementById("stageCancelBtn").addEventListener("click", closeStageModal);
    document.getElementById("stageModalOverlay").addEventListener("click", function (e) {
      if (e.target === this) closeStageModal();
    });
    document.getElementById("stageForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var name = document.getElementById("fStageName").value.trim();
      var desc = document.getElementById("fStageDesc").value.trim();
      if (!name) { alert("Please give the stage a name."); return; }
      var key = "custom-" + name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") + "-" + Date.now();
      var navLabel = name.length > 16 ? name.slice(0, 15) + "\u2026" : name;
      customStages.push({ key: key, navLabel: navLabel, label: name, desc: desc || "", custom: true });
      saveStages();
      closeStageModal();
      activeStage = key;
      renderNav();
      renderPage();
      showToast("Stage added. Click \u201cExport Page\u201d to save a shareable copy.");
    });
    document.getElementById("fStage").addEventListener("change", function () {
      populateIntentSelect(this.value);
    });
    document.getElementById("fIntent").addEventListener("change", function () {
      document.getElementById("newIntentRow").classList.toggle("hidden", this.value !== "__new__");
    });
    document.getElementById("fHtml").addEventListener("input", function () {
      document.getElementById("modalPreview").srcdoc = this.value;
    });
    document.getElementById("templateForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var stage = document.getElementById("fStage").value;
      var intentSel = document.getElementById("fIntent").value;
      var intent = intentSel === "__new__" ? document.getElementById("fNewIntent").value.trim() : intentSel;
      var region = document.getElementById("fRegion").value.trim() || "All";
      var name = document.getElementById("fName").value.trim();
      var subject = document.getElementById("fSubject").value.trim();
      var desc = document.getElementById("fDesc").value.trim();
      var htmlVal = document.getElementById("fHtml").value;

      if (!name) { alert("Please give the template a name."); return; }
      if (!htmlVal.trim()) { alert("Please paste the email's HTML code."); return; }
      if (!intent) { alert("Please name the new category."); return; }

      var fields = {
        stage: stage,
        intent: intent,
        region: region,
        name: name,
        subject: subject || null,
        desc: desc || "No description provided.",
        html: htmlVal
      };

      if (editingId) {
        var customIdx = customTemplates.findIndex(function (t) { return t.id === editingId; });
        if (customIdx !== -1) {
          customTemplates[customIdx] = Object.assign({}, customTemplates[customIdx], fields);
          saveCustom();
        } else {
          edits[editingId] = fields;
          saveEdits();
        }
        closeModal();
        activeStage = stage;
        openItemIds[editingId] = true;
        renderNav();
        renderPage();
        var editedEl = document.querySelector('.accordion-item[data-id="' + editingId + '"]');
        if (editedEl) editedEl.scrollIntoView({ behavior: "smooth", block: "center" });
        showToast("Template updated. Click \u201cExport Page\u201d to save a shareable copy.");
        return;
      }

      var newTpl = Object.assign({ id: "custom-" + Date.now(), custom: true }, fields);
      customTemplates.push(newTpl);
      saveCustom();
      closeModal();
      activeStage = stage;
      openItemIds[newTpl.id] = true;
      renderNav();
      renderPage();
      var el = document.querySelector('.accordion-item[data-id="' + newTpl.id + '"]');
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
      showToast("Template added. Click \u201cExport Page\u201d to save a shareable copy.");
    });
  }

  // ---------------- Export ----------------
  function exportPage() {
    var mergedTemplates = allTemplates();
    var mergedStages = allStages();
    var tJson = JSON.stringify(mergedTemplates).replace(/<\/script/gi, "<\\/script");
    var sJson = JSON.stringify(mergedStages.map(function (s) {
      var clean = Object.assign({}, s);
      delete clean.custom;
      return clean;
    })).replace(/<\/script/gi, "<\\/script");
    document.getElementById("base-data").textContent = tJson;
    document.getElementById("stages-data").textContent = sJson;
    closeModal();
    closeStageModal();

    var htmlOut = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
    var blob = new Blob([htmlOut], { type: "text/html" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "Mitratech-Email-Templates-TA.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Commit merged state as the new baseline so nothing duplicates later.
    BASE_TEMPLATES = mergedTemplates.map(function (t) {
      var clean = Object.assign({}, t);
      delete clean.edited;
      delete clean.custom;
      return clean;
    });
    BASE_STAGES = mergedStages.map(function (s) {
      var clean = Object.assign({}, s);
      delete clean.custom;
      return clean;
    });
    customTemplates = [];
    customStages = [];
    edits = {};
    saveCustom();
    saveStages();
    saveEdits();
    renderNav();
    renderPage();
    showToast("File downloaded. Share that file \u2014 it includes everything you've added.");
  }

  document.getElementById("exportBtn").addEventListener("click", exportPage);

  function esc2(s) { return esc(s); }

  function switchMegaTab(tab) {
    megaTab = tab;
    document.querySelectorAll(".mega-tab").forEach(function (b) {
      b.classList.toggle("active", b.getAttribute("data-mega") === tab);
    });
    document.getElementById("navbarActions").classList.toggle("hidden", tab !== "northAmerica");

    document.getElementById("pageHeader").classList.toggle("hidden", tab !== "northAmerica");

    document.getElementById("proposalView").classList.toggle("hidden", tab !== "proposal");

    if (tab === "global") renderGlobalTab();

  function renderIntroBanner() {
    var banner = document.getElementById("introBanner");
    var copy = {
      global: "Every candidate email template currently live in Greenhouse Global \u2014 audited for what's broken, duplicated, or worth keeping. This is the \u201cbefore\u201d picture.",
      northAmerica: "The standardized template set already built and in use for Canada, Mexico, and the US \u2014 organized by pipeline stage, editable, and exportable.",
      proposal: "The proposed \u201cafter\u201d picture: one Global template set plus specialized regional sets, all on the same Mitratech branding. This is the target state once cleanup is complete."
    };
    banner.innerHTML = '<p><strong>Global Template Migration & Standardization</strong> \u2014 ' + copy[megaTab] +
      ' This document is also the living source of truth going forward: once cleanup is approved, template updates happen here first.</p>';

  // ---------------- Global Templates tab (read-only, 64 current templates) ----------------
  function renderGlobalSubnav() {
    var nav = document.getElementById("subnavBar");
    var counts = {};
    GLOBAL_STAGE_ORDER.forEach(function (k) { counts[k] = 0; });
    GLOBAL_ENTRIES.forEach(function (e) { counts[e.stage] = (counts[e.stage] || 0) + 1; });
    nav.innerHTML = GLOBAL_STAGE_ORDER.map(function (k, i) {
      var cls = "subnav-tab" + (k === globalActiveStage ? " active" : "");
      return '<button class="' + cls + '" data-stage="' + k + '">' + esc(GLOBAL_STAGE_LABELS[k]) + ' <span class="count-badge-sm">' + counts[k] + '</span></button>';
    }).join("");
    nav.querySelectorAll(".subnav-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        globalActiveStage = btn.getAttribute("data-stage");
        renderGlobalTab();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  }

  function globalCardTemplate(e, idx) {
    var meta = VERDICT_META[e.verdict] || VERDICT_META.OUT_OF_SCOPE;
    var replaceBtn = "";
    if (e.replaces_id) {
      var repl = allTemplates().find(function (x) { return x.id === e.replaces_id; });
      if (repl) replaceBtn = '<button class="audit-jump-btn" data-jump="' + esc(repl.id) + '">View standardized replacement: ' + esc(repl.name) + ' (' + esc(repl.region) + ') &rarr;</button>';
    }
    var previewId = "gprev-" + idx;
    return '<div class="accordion-item" data-gidx="' + idx + '">' +
      '<div class="accordion-header" role="button" tabindex="0" data-gaction="toggle" data-gidx="' + idx + '">' +
      '<span class="badge" style="background:' + meta.color + '22;color:' + meta.color + ';border:1px solid ' + meta.color + '55;">' + meta.icon + ' ' + esc(meta.label) + '</span>' +
      '<span class="item-title">' + esc(e.name) + '</span>' +
      '<span class="chevron">&#9662;</span>' +
      '</div>' +
      '<div class="accordion-body">' +
      '<p class="desc">' + esc(e.reason) + '</p>' +
      (e.subject ? '<p class="subject-line"><span>Subject</span>' + esc(e.subject) + '</p>' : '') +
      replaceBtn +
      '<div class="preview-wrap" style="margin-top:12px;"><iframe class="preview" id="' + previewId + '" style="height:420px;"></iframe></div>' +
      '</div></div>';
  }

  function renderGlobalTab() {
    renderGlobalSubnav();
    var container = document.getElementById("globalView");
    var items = GLOBAL_ENTRIES.map(function (e, i) { e.__idx = i; return e; }).filter(function (e) { return e.stage === globalActiveStage; });
    var stageLabel = GLOBAL_STAGE_LABELS[globalActiveStage];

    var counts = {};
    VERDICT_ORDER.forEach(function (v) { counts[v] = 0; });
    GLOBAL_ENTRIES.forEach(function (e) { counts[e.verdict] = (counts[e.verdict] || 0) + 1; });
    var statsHtml = '<div class="audit-stats">' +
      '<div class="audit-stat-hero"><div class="num">' + GLOBAL_ENTRIES.length + '</div><div class="lbl">Current Global Templates</div></div>' +
      '<div class="audit-stat-arrow">&#8594;</div>' +
      '<div class="audit-stat-hero highlight"><div class="num">' + BASE_TEMPLATES.length + '</div><div class="lbl">Standardized Today (North America)</div></div>' +
      '</div>' +
      '<div class="audit-filters">' + VERDICT_ORDER.map(function (v) {
        return '<span class="audit-filter-btn" style="--vc:' + VERDICT_META[v].color + ';cursor:default;">' + VERDICT_META[v].icon + ' ' + VERDICT_META[v].label + ' (' + counts[v] + ')</span>';
      }).join("") + '</div>';

    var order = VERDICT_ORDER;
    var html = '<div class="audit-intro"><p class="eyebrow">Global Templates \u2014 ' + esc(stageLabel) + '</p>' +
      '<h1>' + esc(stageLabel) + '</h1>' +
      '<p>' + items.length + ' template(s) currently live in Greenhouse Global for this stage. Expand any card to read the exact content and see why it\'s flagged.</p></div>' +
      statsHtml;

    order.forEach(function (v) {
      var group = items.filter(function (e) { return e.verdict === v; });
      if (group.length === 0) return;
      var meta = VERDICT_META[v];
      html += '<div class="audit-group"><p class="audit-group-label" style="color:' + meta.color + '">' + meta.icon + ' ' + esc(meta.label) + ' <span class="audit-group-count">' + group.length + '</span></p>' +
        '<div class="accordion-list">' + group.map(function (e) { return globalCardTemplate(e, e.__idx); }).join("") + '</div></div>';
    });
    if (items.length === 0) html += '<p class="empty-state">No templates in this stage.</p>';

    container.querySelectorAll("[data-jump]").forEach(function (btn) {

        switchMegaTab("northAmerica");
        jumpToTemplate(this.getAttribute("data-jump"));
      });

  function wrapPreviewHtml(body) {
    if (!body) return "<p style='font-family:sans-serif;color:#94a3b8;padding:20px;'>(empty)</p>";
    if (body.indexOf("<table") !== -1 || body.indexOf("<div") !== -1) return body;
    var escaped = String(body).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    return '<div style="font-family:Segoe UI,Arial,sans-serif; padding:24px; background:#fff; color:#0f172a; max-width:600px; margin:0 auto;">' +
      '<div style="font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#94a3b8; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #e2e8f0;">Plain text \u2014 not currently branded</div>' +
      '<div style="font-size:14px; line-height:1.7; white-space:pre-wrap;">' + escaped + '</div></div>';
  }

  function jumpToTemplate(id) {
    var t = allTemplates().find(function (x) { return x.id === id; });
    if (!t) return;
    activeStage = t.stage;
    openItemIds[t.id] = true;
    renderNav();
    renderPage();
    setTimeout(function () {
      var el = document.querySelector('.accordion-item[data-id="' + id + '"]');
      if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    }, 150);
  }

      return '<button class="' + cls + '" data-region="' + r.key + '">' + esc(r.label) + ' <span class="count-badge-sm">' + count + '</span></button>';
    }).join("");
    nav.querySelectorAll(".subnav-tab").forEach(function (btn) {
      btn.addEventListener("click", function () {
        proposalActiveRegion = btn.getAttribute("data-region");
        renderProposalTab();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  }

  function proposalCardTemplate(item, idx, keyPrefix) {
    var isDraft = !!item.draft;
    var previewId = keyPrefix + "-prev-" + idx;
    return '<div class="accordion-item" data-pidx="' + idx + '">' +
      '<div class="accordion-header" role="button" tabindex="0" data-paction="toggle" data-pidx="' + idx + '" data-pkey="' + keyPrefix + '">' +
      '<span class="badge" style="background:' + regionColor(item.region) + '22;color:' + regionColor(item.region) + ';border:1px solid ' + regionColor(item.region) + '55;">' + esc(item.region) + '</span>' +
      '<span class="item-title">' + esc(item.name) + '</span>' +
      (isDraft ? '<span class="custom-flag" style="background:#f59e0b;">Draft</span>' : '<span class="custom-flag" style="background:#16a34a;">Ready</span>') +
      '<span class="chevron">&#9662;</span>' +
      '</div>' +
      '<div class="accordion-body">' +
      '<p class="desc">' + esc(item.desc) + '</p>' +
      (item.subject ? '<p class="subject-line"><span>Subject</span>' + esc(item.subject) + '</p>' : '') +
      '<div class="preview-wrap"><iframe class="preview" id="' + previewId + '" style="height:560px;"></iframe></div>' +
      '</div></div>';
  }

  function renderProposalTab() {
    renderProposalSubnav();
    var container = document.getElementById("proposalView");
    var region = PROPOSAL_REGIONS.find(function (r) { return r.key === proposalActiveRegion; });
    var items, keyPrefix;

    if (region.key === "Global") {
      items = GLOBAL_SECTION;
      keyPrefix = "gs";
    } else if (["MX", "CAD", "US"].indexOf(region.key) !== -1) {
      items = allTemplates().filter(function (t) { return t.region === region.key; });
      keyPrefix = "na";
    } else {
      items = REGIONAL_PROPOSAL.filter(function (t) { return t.region === region.key; });
      keyPrefix = "rp";
    }

    var html = '<div class="audit-intro"><p class="eyebrow">New Global Templates Proposal</p>' +
      '<h1>' + esc(region.label) + '</h1>' +
      '<p>' + esc(region.desc) + '</p></div>';

    if (region.key !== "Global") {
      html += '<p style="text-align:center;color:var(--muted);font-size:13px;margin:-14px 0 26px;">Plus every template in the <strong>Global</strong> tab above &mdash; these are only the ' + esc(region.label) + '-specific ones.</p>';
    }

    var groups = {};
    var order = [];
    items.forEach(function (it) {
      var key = it.intent || "General";
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(it);
    });

    if (items.length === 0) {
      html += '<div class="empty-state">No templates yet for this region.</div>';
    } else {
      order.forEach(function (key) {
        html += '<div class="intent-group"><p class="intent-group__label">' + esc(key) + '</p><div class="accordion-list">' +
          groups[key].map(function (it) { return proposalCardTemplate(it, items.indexOf(it), keyPrefix); }).join("") +
          '</div></div>';
      });
    }

    container.innerHTML = html;
    container.querySelectorAll('[data-paction="toggle"]').forEach(function (el) {
      el.addEventListener("click", function () {
        var idx = this.getAttribute("data-pidx");
        var key = this.getAttribute("data-pkey");
        var item = container.querySelector('.accordion-item[data-pidx="' + idx + '"]');
        var wasOpen = item.classList.contains("open");
        item.classList.toggle("open");
        if (!wasOpen) {
          var frame = document.getElementById(key + "-prev-" + idx);
          var dataItem = items[parseInt(idx, 10)];
          if (frame && !frame.srcdoc && dataItem) frame.srcdoc = dataItem.html;
        }
      });
    });
  }

  document.querySelectorAll(".mega-tab").forEach(function (btn) {
    btn.addEventListener("click", function () { switchMegaTab(this.getAttribute("data-mega")); });
  });


  // ---------------- Init ----------------
  initModal();
  document.getElementById("navbarActions").classList.add("hidden");
  document.getElementById("stageTabs").classList.add("hidden");
  document.getElementById("pageHeader").classList.add("hidden");
  document.getElementById("content").classList.add("hidden");
  document.getElementById("globalView").classList.remove("hidden");
  document.querySelector('.mega-tab[data-mega="global"]').classList.add("active");
  renderIntroBanner();
  renderGlobalTab();
})();
</script>

</body>
</html>
